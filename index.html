<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

body{background:var(--bg);color:var(--txt);font-family:var(--fb);min-height:100vh}

.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(168,85,247,.04)1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.astat-n{font-family:var(--fh);font-size:28px;color:var(--acc)}
.astat-l{font-size:12px;color:var(--mut);margin-top:4px}
.amem{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;margin-bottom:10px;overflow:hidden}
.amem summary{padding:12px 16px;cursor:pointer;font-weight:700;list-style:none;display:flex;align-items:center;gap:8px}
.amem summary::-webkit-details-marker{display:none}
.atag{font-size:11px;color:var(--mut);font-weight:400}
.acnt{margin-left:auto;font-size:12px;color:var(--acc3);background:rgba(34,211,238,.1);padding:2px 8px;border-radius:6px}
.aday{padding:12px 16px;border-top:1px solid var(--bdr);font-size:13px}
.aday-row{display:flex;align-items:center;gap:8px;color:var(--mut);margin-bottom:8px;flex-wrap:wrap}
.dbtn{margin-left:auto;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:var(--red);padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.task-tags{display:flex;flex-wrap:wrap;gap:6px}

.move-grid{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:12px}
.move-grid>div{display:flex;flex-direction:column;gap:6px}
.mbtn{padding:9px 20px;background:linear-gradient(135deg,var(--acc),#f0532a);border:none;border-radius:8px;color:#fff;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCrgMfdn79JOKx4XKA4hNwNZkhNACoizT4",
  authDomain:"restart-challenge-2026.firebaseapp.com",
  databaseURL:"https://restart-challenge-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"restart-challenge-2026",
  storageBucket:"restart-challenge-2026.firebasestorage.app",
  messagingSenderId:"477447792834",
  appId:"1:477447792834:web:c657ca4d3e612d1ccf335b"
});
// 韋宏Ｂ招募活動：用同一個 Firebase 專案，資料路徑前綴 weihong2/ 避免跟其他活動衝突
var DB = firebase.database().ref("weihong2");

// ── Google Drive 上傳（透過 Google Apps Script 中繼）──
var GAS_URL = "https://script.google.com/macros/s/AKfycbxW1sBrsPpawSqxj2vbZqtHDS1L7KKEjvRYQ-04-Bb2dix7nOYaJcYRVE0KB2sNZzG6Xw/exec";

async function uploadToGDrive(file, bigC, team, name, taskKey, date){
  // 把 File 物件轉成 base64
  var base64 = await new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload  = function(e){ resolve(e.target.result.split(",")[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  // 組出有意義的檔名：大C_隊伍_姓名_日期_任務.jpg
  var ext = file.type.includes("png") ? "png" : "jpg";
  var filename = [bigC, team, name, date, taskKey].join("_").replace(/[|/\s]/g,"_") + "." + ext;

  var res = await fetch(GAS_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      data:     base64,
      filename: filename,
      mimeType: file.type || "image/jpeg"
    })
  });

  var json = await res.json();
  if(!json.success) throw new Error(json.error || "Google Drive 上傳失敗");
  return json.url; // 回傳 thumbnail 網址
}
var ADMIN_PW = "jimmy0117";
var A_START = "2026-07-06";
var A_END   = "2026-08-02";
var TOTAL_DAYS = 28;

// 任務定義：天數型任務（要做到N天/N次）
var TASKS = [
  {key:"join",  icon:"👥", name:"入群1位",       goal:21, unit:"天", totalDays:28},
  {key:"bv",    icon:"🧪", name:"BV試用分享",     goal:21, unit:"天", totalDays:28},
  {key:"link",  icon:"🔗", name:"強連結",         goal:4,  unit:"次", totalDays:28},
  {key:"script",icon:"🎬", name:"跑劇本",         goal:4,  unit:"次", totalDays:28},
];
// 香綺大C 專屬額外任務
var EXTRA_TASK_FOR = "香綺大C";
var EXTRA_TASK = {key:"close", icon:"🤝", name:"週週100BV/評估/締結", goal:4, unit:"次", totalDays:28, noGoal:true};

// 隨機生成的範例資料（先佔位，之後可由管理員調整或你提供正式名單後我直接改）
// 三大C基本結構（隊伍與隊員等正式名單確認後再補入）
var DEFAULT_DATA = {
  "香綺大C": {},
  "子林大C": {},
  "婷芝大C": {}
};

// ── 全域狀態 ──
var S={
  tab:"submit", data:{}, records:{}, adminOk:false, adminPw:"",
  cBig:"", cTeam:"", cName:"",
  photos:{}, smsg:"", busy:false,
  et:{cBig:"",cTeam:"",name:"",from:"",to:""}, emsg:"",
  viewBig:"", viewSort:"default",
  adminSel:{cBig:"",cTeam:"",name:""}
};

// 只清打卡紀錄（不動大C/隊伍名單）
var RECORDS_VERSION = "v1-clean"; // 改這個值 → 只清打卡紀錄
DB.child("records_version").once("value", function(vs){
  if(vs.val() !== RECORDS_VERSION){
    DB.child("records").remove();
    DB.child("records_version").set(RECORDS_VERSION);
  }
});

DB.child("data").on("value", function(s){
  var val = s.val();
  if(!val || Object.keys(val).length === 0){
    DB.child("data").set(DEFAULT_DATA);
  } else {
    S.data = val; R();
  }
});
DB.child("records").on("value",function(s){S.records=s.val()||{};R();});

// ── 台灣時間工具函式 ──
function pad(n){return String(n).padStart(2,"0");}
function twToday(){
  var tw=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  return tw.getFullYear()+"-"+pad(tw.getMonth()+1)+"-"+pad(tw.getDate());
}
function actDay(){
  var tw=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  var d=Math.floor((tw-new Date(A_START+"T00:00:00"))/86400000);
  return(d>=0&&d<TOTAL_DAYS)?d+1:null;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// 取得所有大C
function bigCs(){return Object.keys(S.data);}
// 取得某大C的隊伍
function teamsOf(bigC){return S.data[bigC]?Object.keys(S.data[bigC]):[];}
// 取得某大C某隊的成員
function membersOf(bigC,team){return (S.data[bigC]&&S.data[bigC][team])||[];}
// 取得某人適用的任務（香綺大C多一項）
function tasksFor(bigC){
  return bigC===EXTRA_TASK_FOR ? TASKS.concat([EXTRA_TASK]) : TASKS;
}
// key 用人名（假設同名不重複；若需要可改成 bigC/team/name 組合）
function personKey(bigC,team,name){return bigC+"|"+team+"|"+name;}

// 計算某人某任務累積次數（不限定當天）
function taskCount(bigC,team,name,taskKey){
  var pk=personKey(bigC,team,name);
  var rec=S.records[pk]||{};
  var cnt=0;
  Object.keys(rec).forEach(function(date){
    if(date<A_START||date>A_END)return;
    var day=rec[date];
    if(day&&day[taskKey])cnt++;
  });
  return cnt;
}
// 個人整體完成率（所有任務平均達標%）
function personPct(bigC,team,name){
  // 排除 noGoal 任務（如「週週100BV/評估/締結」）：這類任務只算次數，不算進完成度百分比
  var tasks=tasksFor(bigC).filter(function(t){return !t.noGoal;});
  if(!tasks.length)return 0;
  var sum=0;
  tasks.forEach(function(t){
    var c=taskCount(bigC,team,name,t.key);
    sum+=Math.min(c/t.goal,1);
  });
  return (sum/tasks.length)*100;
}
// 大C整體完成率（旗下所有人平均）
function bigCPct(bigC){
  var teams=teamsOf(bigC);
  var all=[];
  teams.forEach(function(t){membersOf(bigC,t).forEach(function(m){all.push({team:t,name:m});});});
  if(!all.length)return 0;
  var sum=all.reduce(function(x,p){return x+personPct(bigC,p.team,p.name);},0);
  return sum/all.length;
}
// 某大C旗下某隊的完成率（隊內所有人平均）
function teamPct(bigC,team){
  var members=membersOf(bigC,team);
  if(!members.length)return 0;
  var sum=members.reduce(function(x,m){return x+personPct(bigC,team,m);},0);
  return sum/members.length;
}

// 提交
async function doSubmit(){
  var today=twToday();
  if(!S.cBig||!S.cTeam||!S.cName)return sm("⚠️ 請選擇大C、隊伍、姓名");
  var pk=personKey(S.cBig,S.cTeam,S.cName);
  if(S.records[pk]&&S.records[pk][today])return sm("⚠️ 今天已提交過囉！");
  var tasks=tasksFor(S.cBig);
  var photosToUpload=tasks.filter(function(t){return S.photos[t.key] instanceof File;});
  if(!photosToUpload.length)return sm("⚠️ 請至少上傳一項今天完成任務的照片");
  S.busy=true;
  sm("上傳中，請稍候⋯（共"+photosToUpload.length+"張照片）");
  try{
    var dayData={ts:new Date().toISOString()};
    // 逐一上傳到 Google Drive，取得網址
    for(var i=0;i<photosToUpload.length;i++){
      var t=photosToUpload[i];
      var url=await uploadToGDrive(S.photos[t.key],S.cBig,S.cTeam,S.cName,t.key,today);
      dayData[t.key]=url;
      sm("上傳中⋯（"+( i+1)+"/"+photosToUpload.length+"）");
    }
    await DB.child("records/"+pk+"/"+today).set(dayData);
    S.photos={};
    sm("🎉 今日任務已記錄！");
  }catch(e){sm("❌ 上傳失敗："+e.message);}
  S.busy=false;R();
}
function sm(m){S.smsg=m;R();}

// 管理員：移動日期
async function doMove(){
  var bigC=S.et.cBig,team=S.et.cTeam,name=S.et.name,f=S.et.from,t=S.et.to;
  if(!bigC||!team||!name||!f||!t)return em("⚠️ 請填寫完整欄位");
  if(f===t)return em("⚠️ 來源與目標日期相同");
  var pk=personKey(bigC,team,name);
  var rec=(S.records[pk]||{})[f];
  if(!rec)return em("⚠️ 該成員在來源日期沒有紀錄");
  if((S.records[pk]||{})[t])return em("⚠️ 目標日期已有紀錄");
  await DB.child("records/"+pk+"/"+t).set(Object.assign({},rec,{adminMoved:true}));
  await DB.child("records/"+pk+"/"+f).remove();
  em("✅ 已將 "+name+" 的 "+f+" 移至 "+t);
  S.et={cBig:"",cTeam:"",name:"",from:"",to:""};
}
function em(m){S.emsg=m;R();}

async function delRec(pk,date){
  await DB.child("records/"+pk+"/"+date).remove();
}

function doLogin(){
  var el=document.getElementById("pwIn");
  var pw=el?el.value:"";
  if(pw===ADMIN_PW){S.adminOk=true;R();}
  else alert("密碼錯誤");
}

// ══ RENDER ══
function R(){document.getElementById("app").innerHTML=html();bind();}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function html(){
  var today=twToday(),day=actDay();
  var h='<div class="bg-grid"></div>';
  h+='<header class="hero">';
  h+='<div class="hero-badge">⚔️ 招募挑戰</div>';
  h+='<h1 class="hero-title">韋宏Ｂ招募活動</h1>';
  h+='<p class="hero-desc">7/6 – 8/2｜入群・BV試用・強連結・跑劇本</p>';
  h+='<div class="hero-day">'+(day?'🗡️ 活動第 '+day+' 天 / '+TOTAL_DAYS+' 天':'活動期間：7/6 – 8/2')+'</div>';
  h+='</header>';
  h+='<nav class="tabs">';
  [{k:"submit",l:"⚔️ 提交任務"},{k:"view",l:"📊 查看進度"},{k:"admin",l:"🔑 管理員"}].forEach(function(t){
    h+='<button class="tab'+(S.tab===t.k?" on":"")+'" id="tab_'+t.k+'">'+t.l+'</button>';
  });
  h+='</nav><main class="main">';
  if(S.tab==="submit")h+=htmlSubmit(today);

// 隊員個人卡片：整體完成度 + 每項任務各自28天的點點點
// adminMode=true 時，每個點點可以點擊查看/刪除當天紀錄（管理員專用）
function memberCard(bigC,team,name,pct,adminMode){
  var tasks=tasksFor(bigC);
  var pk=personKey(bigC,team,name);
  var rec=S.records[pk]||{};
  var color=pct>=80?"#2ecc71":pct>=50?"#22d3ee":pct>=25?"#e67e22":"#e74c3c";

  var h='<div class="mcard2">';
  h+='<div class="mcard2-head">';
  h+='<span class="mcard2-name">'+esc(name)+'</span>';
  h+='<span class="mcard2-pct" style="color:'+color+'">'+Math.round(pct)+'%</span>';
  h+='</div>';
  h+='<div class="pbar-track" style="height:8px;margin-bottom:10px"><div class="pbar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';

  tasks.forEach(function(t){
    var cnt=taskCount(bigC,team,name,t.key);
    h+='<div class="mcard2-task">';
    h+='<div class="mcard2-task-label">'+t.icon+' '+t.name+(t.noGoal?'':' '+cnt+'/'+t.goal+t.unit)+(t.noGoal?'　'+cnt+t.unit:'')+'</div>';
    h+='<div class="mcard2-dots">';
    for(var i=0;i<TOTAL_DAYS;i++){
      var d=new Date(A_START); d.setDate(d.getDate()+i);
      var dateStr=d.toISOString().split("T")[0];
      var photo=rec[dateStr]&&rec[dateStr][t.key];
      var done=!!photo;
      if(adminMode && done){
        h+='<a href="'+photo+'" target="_blank" class="mcard2-dot on" data-admindot="1" title="第'+(i+1)+'天　點擊查看照片"></a>';
      }else{
        h+='<div class="mcard2-dot'+(done?' on':'')+'" title="第'+(i+1)+'天"></div>';
      }
    }
    h+='</div></div>';
  });

  if(adminMode){
    // 列出此人所有有提交紀錄的日期，供管理員逐筆刪除
    var dates=Object.keys(rec).sort();
    if(dates.length){
      h+='<div class="mcard2-admin-dates"><div class="mcard2-admin-title">📅 提交紀錄（點擊刪除整天紀錄）</div>';
      dates.forEach(function(d){
        h+='<div class="mcard2-admin-daterow">';
        h+='<span>'+d+(rec[d].adminMoved?' <span style="color:var(--acc);font-size:10px">已移動</span>':'')+'</span>';
        h+='<button class="dbtn" data-deladmin-pk="'+esc(pk)+'" data-deladmin-d="'+d+'">🗑️ 刪除</button>';
        h+='</div>';
      });
      h+='</div>';
    }else{
      h+='<div class="mcard2-admin-dates"><div style="color:var(--mut);font-size:12px">尚無提交紀錄</div></div>';
    }
  }

  h+='</div>';
  return h;
}

  });

  filteredPeople.forEach(function(p){
    var pk=personKey(p.big,p.team,p.name);

    });
    h+='</details>';
  });
  if(!hasAny)h+='<div style="color:var(--mut);font-size:13px;padding:20px 0">目前無人打卡</div>';
  h+='</div>';
  return h;
}

// ══ 事件綁定 ══
function bind(){
  ["submit","view","admin"].forEach(function(k){
    var el=document.getElementById("tab_"+k);
    if(el)el.addEventListener("click",function(){S.tab=k;R();});
  });
  // 查看進度頁：大C選單與排序按鈕
  var vbs=document.getElementById("viewBigSel");
  if(vbs)vbs.addEventListener("change",function(){S.viewBig=this.value;S.viewSort="default";R();});
  var sortBtn=document.getElementById("sortBtn");
  if(sortBtn)sortBtn.addEventListener("click",function(){
    S.viewSort = S.viewSort==="default" ? "desc" : S.viewSort==="desc" ? "asc" : "default";
    R();
  });
  // 管理員：選人員快速查看
  var adBig=document.getElementById("adBig");
  var adTeam=document.getElementById("adTeam");
  var adName=document.getElementById("adName");
  if(adBig)adBig.addEventListener("change",function(){S.adminSel.cBig=this.value;S.adminSel.cTeam="";S.adminSel.name="";R();});
  if(adTeam)adTeam.addEventListener("change",function(){S.adminSel.cTeam=this.value;S.adminSel.name="";R();});
  if(adName)adName.addEventListener("change",function(){S.adminSel.name=this.value;R();});
  // 管理員：在人員卡片上刪除單筆紀錄
  document.querySelectorAll("[data-deladmin-pk]").forEach(function(btn){
    btn.addEventListener("click",function(){delRec(this.dataset.deladminPk,this.dataset.deladminD);});
  });
  var sb=document.getElementById("selBig");
  if(sb)sb.addEventListener("change",function(){S.cBig=this.value;S.cTeam="";S.cName="";S.photos={};S.smsg="";R();});
  var st=document.getElementById("selTeam");
  if(st)st.addEventListener("change",function(){S.cTeam=this.value;S.cName="";S.photos={};S.smsg="";R();});
  var sn=document.getElementById("selName");
  if(sn)sn.addEventListener("change",function(){S.cName=this.value;S.photos={};S.smsg="";R();});
  document.querySelectorAll("[data-uploadbox]").forEach(function(box){
    box.addEventListener("click",function(){
      var k=this.dataset.uploadbox;
      var fi=document.getElementById("fi_"+k);
      if(fi)fi.click();
    });
  });
  document.querySelectorAll("input[id^='fi_']").forEach(function(fi){
    var k=fi.id.replace("fi_","");
    fi.addEventListener("change",function(){
      var f=this.files[0];
      if(!f)return;
      var reader=new FileReader();
      reader.onload=function(e){
        S.photos[k]=e.target.result;
        R();
      };
      reader.readAsDataURL(f);
    });
  });
  document.querySelectorAll("[data-rmphoto]").forEach(function(btn){
    btn.addEventListener("click",function(ev){
      ev.stopPropagation();
      var k=this.dataset.rmphoto;
      delete S.photos[k];
      R();
    });
  });
  var subBtn=document.getElementById("submitBtn");
  if(subBtn)subBtn.addEventListener("click",doSubmit);

  var pw=document.getElementById("pwIn");
  var lb=document.getElementById("loginBtn");
  if(pw)pw.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  if(lb)lb.addEventListener("click",doLogin);

  var etBig=document.getElementById("etBig");
  var etTeam=document.getElementById("etTeam");
  var etName=document.getElementById("etName");
  var etFrom=document.getElementById("etFrom");
  var etTo=document.getElementById("etTo");
  var moveBtn=document.getElementById("moveBtn");
  if(etBig)etBig.addEventListener("change",function(){S.et.cBig=this.value;S.et.cTeam="";S.et.name="";R();});
  if(etTeam)etTeam.addEventListener("change",function(){S.et.cTeam=this.value;S.et.name="";R();});
  if(etName)etName.addEventListener("change",function(){S.et.name=this.value;});
  if(etFrom)etFrom.addEventListener("change",function(){S.et.from=this.value;});
  if(etTo)etTo.addEventListener("change",function(){S.et.to=this.value;});
  if(moveBtn)moveBtn.addEventListener("click",doMove);

  document.querySelectorAll("[data-delrec-pk]").forEach(function(btn){
    btn.addEventListener("click",function(){delRec(this.dataset.delrecPk,this.dataset.delrecD);});
  });
}

// 本地模擬版資料是同步載入的，不需要額外的載入畫面（上面的 DB.on 已經會立即 render 真正內容）
</script>
</body>
