  },
  "е©ЈиКЭе§ІC": {

    "жЉФз§ЇйЪКF": ["з§ЇзѓДеНБеЕ≠","з§ЇзѓДеНБдЄГ","з§ЇзѓДеНБеЕЂ"]
  }
};

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

// жЉФз§ЇйЪКA=100% жЉФз§ЇйЪКB=50% жЉФз§ЇйЪКC=30% жЉФз§ЇйЪКD=70% жЉФз§ЇйЪКE=90% жЉФз§ЇйЪКF=80%
// йВПиЉѓпЉЪжѓПдЇЇеЬ®жѓПеАЛдїїеЛЩдЄКпЉМдЊЭзЫЃж®Ще§©жХЄ/жђ°жХЄ √Ч еЃМжИРеЇ¶жѓФдЊЛпЉМеЫЮе°Ђе∞НжЗЙе§©жХЄзЪДзіАйМД
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
var DEMO_PCTS = {
  "жЉФз§ЇйЪКA": 1.0, "жЉФз§ЇйЪКB": 0.5, "жЉФз§ЇйЪКC": 0.3,
  "жЉФз§ЇйЪКD": 0.7, "жЉФз§ЇйЪКE": 0.9, "жЉФз§ЇйЪКF": 0.8
};
var TINY_PHOTO = "data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="#222"/><circle cx="20" cy="20" r="10" fill="#888"/></svg>');

function buildDemoRecords(){
  var recs = {};
  Object.keys(DEFAULT_DATA).forEach(function(bigC){
    Object.keys(DEFAULT_DATA[bigC]).forEach(function(team){
      var pct = DEMO_PCTS[team];
      if(pct===undefined) return;
      DEFAULT_DATA[bigC][team].forEach(function(name){
        var pk = bigC+"|"+team+"|"+name;
        var tasks = (bigC==="й¶ЩзґЇе§ІC") ? TASKS.concat([EXTRA_TASK]) : TASKS;
        recs[pk] = recs[pk] || {};
        // и®ИзЃЧжѓПеАЛдїїеЛЩи¶БеЃМжИРеєЊе§©/жђ°пЉМдЊЭеЃМжИРеЇ¶жѓФдЊЛ
        var perTaskCount = {};
        tasks.forEach(function(t){
          perTaskCount[t.key] = Math.round(t.goal * pct);
        });
        var maxCount = Math.max.apply(null, Object.values(perTaskCount));
        for(var i=0;i<maxCount;i++){
          var d = new Date("2026-07-03");
          d.setDate(d.getDate()+i);
          var dateStr = d.toISOString().split("T")[0];
          var dayData = {ts:new Date().toISOString()};
          tasks.forEach(function(t){
            if(i < perTaskCount[t.key]) dayData[t.key] = TINY_PHOTO;
          });
          recs[pk][dateStr] = dayData;
        }
      });
    });
  });
  return recs;
}

function twToday(){
  var tw=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  return tw.getFullYear()+"-"+pad(tw.getMonth()+1)+"-"+pad(tw.getDate());
}
function pad(n){return String(n).padStart(2,"0");}
function actDay(){
  var tw=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  var d=Math.floor((tw-new Date(A_START+"T00:00:00"))/86400000);
  return(d>=0&&d<TOTAL_DAYS)?d+1:null;
}

var S={tab:"submit",data:{},records:{},adminOk:false,
  cBig:"",cTeam:"",cName:"",

});

  }
});
DB.child("records").once("value",function(rs){

  if(!existing || Object.keys(existing).length===0){

    DB.child("records").set(buildDemoRecords());
  }
});
DB.child("records").on("value",function(s){S.records=s.val()||{};R();});

// еПЦеЊЧжЙАжЬЙе§ІC
function bigCs(){return Object.keys(S.data);}
// еПЦеЊЧжЯРе§ІCзЪДйЪКдЉН
function teamsOf(bigC){return S.data[bigC]?Object.keys(S.data[bigC]):[];}
// еПЦеЊЧжЯРе§ІCжЯРйЪКзЪДжИРеУ°
function membersOf(bigC,team){return (S.data[bigC]&&S.data[bigC][team])||[];}
// еПЦеЊЧжЯРдЇЇйБ©зФ®зЪДдїїеЛЩпЉИй¶ЩзґЇе§ІCе§ЪдЄАй†ЕпЉЙ
function tasksFor(bigC){
  return bigC===EXTRA_TASK_FOR ? TASKS.concat([EXTRA_TASK]) : TASKS;
}
// key зФ®дЇЇеРНпЉИеБЗи®≠еРМеРНдЄНйЗНи§ЗпЉЫиЛ•йЬАи¶БеПѓжФєжИР bigC/team/name зµДеРИпЉЙ
function personKey(bigC,team,name){return bigC+"|"+team+"|"+name;}

// и®ИзЃЧжЯРдЇЇжЯРдїїеЛЩзіѓз©Нжђ°жХЄпЉИдЄНйЩРеЃЪзХґе§©пЉЙ
function taskCount(bigC,team,name,taskKey){
  var pk=personKey(bigC,team,name);
  var rec=S.records[pk]||{};
  var cnt=0;
  Object.keys(rec).forEach(function(date){
    if(date<A_START||date>A_END)return;
    var day=rec[date];
    if(day&&day[taskKey])cnt++;
  });
  return cnt;
}
// еАЛдЇЇжХійЂФеЃМжИРзОЗпЉИжЙАжЬЙдїїеЛЩеє≥еЭЗйБФж®Щ%пЉЙ
function personPct(bigC,team,name){
  var tasks=tasksFor(bigC);
  var sum=0;
  tasks.forEach(function(t){
    var c=taskCount(bigC,team,name,t.key);
    sum+=Math.min(c/t.goal,1);
  });
  return (sum/tasks.length)*100;
}
// е§ІCжХійЂФеЃМжИРзОЗпЉИжЧЧдЄЛжЙАжЬЙдЇЇеє≥еЭЗпЉЙ
function bigCPct(bigC){
  var teams=teamsOf(bigC);
  var all=[];
  teams.forEach(function(t){membersOf(bigC,t).forEach(function(m){all.push({team:t,name:m});});});
  if(!all.length)return 0;
  var sum=all.reduce(function(x,p){return x+personPct(bigC,p.team,p.name);},0);
  return sum/all.length;
}
// жЯРе§ІCжЧЧдЄЛжЯРйЪКзЪДеЃМжИРзОЗпЉИйЪКеЕІжЙАжЬЙдЇЇеє≥еЭЗпЉЙ
function teamPct(bigC,team){
  var members=membersOf(bigC,team);
  if(!members.length)return 0;
  var sum=members.reduce(function(x,m){return x+personPct(bigC,team,m);},0);
  return sum/members.length;
}

  var tasks=tasksFor(S.cBig);
  var anyPhoto=tasks.some(function(t){return S.photos[t.key];});
  if(!anyPhoto)return sm("вЪ†пЄП иЂЛиЗ≥е∞СдЄКеВ≥дЄАй†ЕдїКе§©еЃМжИРдїїеЛЩзЪДзЕІзЙЗ");

  });

  var sortBtn=document.getElementById("sortBtn");
  if(sortBtn)sortBtn.addEventListener("click",function(){
    S.viewSort = S.viewSort==="default" ? "desc" : S.viewSort==="desc" ? "asc" : "default";
    R();
  });
  var sb=document.getElementById("selBig");
  if(sb)sb.addEventListener("change",function(){S.cBig=this.value;S.cTeam="";S.cName="";S.photos={};S.smsg="";R();});
  var st=document.getElementById("selTeam");
  if(st)st.addEventListener("change",function(){S.cTeam=this.value;S.cName="";S.photos={};S.smsg="";R();});
  var sn=document.getElementById("selName");
  if(sn)sn.addEventListener("change",function(){S.cName=this.value;S.photos={};S.smsg="";R();});
  document.querySelectorAll("[data-uploadbox]").forEach(function(box){
    box.addEventListener("click",function(){
      var k=this.dataset.uploadbox;
      var fi=document.getElementById("fi_"+k);
      if(fi)fi.click();
    });
  });
  document.querySelectorAll("input[id^='fi_']").forEach(function(fi){
    var k=fi.id.replace("fi_","");
    fi.addEventListener("change",function(){
      var f=this.files[0];
      if(!f)return;
      var reader=new FileReader();
      reader.onload=function(e){
        S.photos[k]=e.target.result;
        R();
      };
      reader.readAsDataURL(f);
    });
  });
  document.querySelectorAll("[data-rmphoto]").forEach(function(btn){
    btn.addEventListener("click",function(ev){
      ev.stopPropagation();
      var k=this.dataset.rmphoto;
      delete S.photos[k];
      R();
    });
  });
  var subBtn=document.getElementById("submitBtn");
  if(subBtn)subBtn.addEventListener("click",doSubmit);

  var pw=document.getElementById("pwIn");
  var lb=document.getElementById("loginBtn");
  if(pw)pw.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  if(lb)lb.addEventListener("click",doLogin);

  var etBig=document.getElementById("etBig");
  var etTeam=document.getElementById("etTeam");
  var etName=document.getElementById("etName");
  var etFrom=document.getElementById("etFrom");
  var etTo=document.getElementById("etTo");
  var moveBtn=document.getElementById("moveBtn");
  if(etBig)etBig.addEventListener("change",function(){S.et.cBig=this.value;S.et.cTeam="";S.et.name="";R();});
  if(etTeam)etTeam.addEventListener("change",function(){S.et.cTeam=this.value;S.et.name="";R();});
  if(etName)etName.addEventListener("change",function(){S.et.name=this.value;});
  if(etFrom)etFrom.addEventListener("change",function(){S.et.from=this.value;});
  if(etTo)etTo.addEventListener("change",function(){S.et.to=this.value;});
  if(moveBtn)moveBtn.addEventListener("click",doMove);

  document.querySelectorAll("[data-delrec-pk]").forEach(function(btn){

  });
}
